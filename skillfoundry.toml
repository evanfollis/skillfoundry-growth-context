[repository]
schema_version = "1"
name = "Growth Context"
agent_id = "growth"

[frontdoor]
pinned_paths = [
  'README.md',
  'memory/mission.md',
  'memory/profiles/growth.md',
  'memory/findings/agenticmarket_account_state.md',
  'memory/findings/launchpad_lint_channel_fit.md',
  'memory/plans/agenticmarket_activation_readiness.md',
  'memory/plans/launchpad_lint_launch_package.md'
]
discoverable_paths = ['bundles', 'memory', 'artifacts']

[promotion_policy]
promotable_memory_roots = ['profiles', 'notes', 'plans', 'findings', 'decisions']
required_validation_kinds = ['canon-safe', 'frontdoor-reviewed', 'launch-ready']
